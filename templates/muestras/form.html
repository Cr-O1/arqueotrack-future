{% extends "base.html" %}
{% block title %}{{ title }} - ArqueoTrack{% endblock %}

{% block content %}
<div class="main-content">
    <div class="form-container">
        <h1>{{ title }}</h1>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="form-group">
                <label>{{ form.tipo.label }}</label>
                {{ form.tipo(class="form-control") }}
            </div>
            <div class="form-group">
                <label>{{ form.descripcion.label }}</label>
                {{ form.descripcion(class="form-control") }}
            </div>
            <div class="form-group">
                <label>{{ form.ue_id.label }}</label>
                {{ form.ue_id(class="form-control") }}
            </div>
            <div class="button-group">
                <button type="submit" class="btn">Registrar Muestra</button>
                <a href="{{ url_for('muestra.listar', yacimiento_id=yacimiento.id) }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
