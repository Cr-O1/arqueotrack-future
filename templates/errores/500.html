{% extends "base.html" %}
{% block titulo %}500 — Error del servidor{% endblock %}
{% block contenido %}
<div class="error-page">
  <div class="error-code">500</div>
  <h2>Error interno del servidor</h2>
  <p>Algo salió mal en nuestro lado. Por favor inténtalo de nuevo en unos minutos. Si el problema persiste, contacta con soporte.</p>
  <a href="{{ url_for('main.inicio') if current_user.is_authenticated else url_for('main.portada') }}" class="btn btn-primary">Volver al inicio</a>
</div>
{% endblock %}
