{% extends "base.html" %}
{% block titulo %}403 — Sin acceso{% endblock %}
{% block contenido %}
<div class="error-page">
  <div class="error-code">403</div>
  <h2>Acceso denegado</h2>
  <p>No tienes permisos para acceder a este recurso. Si crees que deberías tener acceso, contacta con el propietario del yacimiento.</p>
  <a href="{{ url_for('main.inicio') if current_user.is_authenticated else url_for('main.portada') }}" class="btn btn-primary">Volver al inicio</a>
</div>
{% endblock %}
