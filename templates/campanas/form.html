{% extends "base.html" %}
{% block title %}{{ title }} - ArqueoTrack{% endblock %}

{% block content %}
<div class="main-content">
    <div class="form-container">
        <h1>{{ title }}</h1>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="form-group">
                <label>{{ form.nombre.label }}</label>
                {{ form.nombre(class="form-control") }}
            </div>
            <div class="form-group">
                <label>{{ form.anio.label }}</label>
                {{ form.anio(class="form-control") }}
            </div>
            <div class="form-group">
                <label>{{ form.objetivos.label }}</label>
                {{ form.objetivos(class="form-control") }}
            </div>
            <div class="button-group">
                <button type="submit" class="btn">Guardar Campaña</button>
                <a href="{{ url_for('campana.listar', yacimiento_id=yacimiento.id) }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
