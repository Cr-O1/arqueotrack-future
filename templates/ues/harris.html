{% extends "base.html" %}
{% block title %}Matriz de Harris - {{ yacimiento.nombre }}{% endblock %}

{% block extra_head %}
<style>
    .harris-container {
        width: 100%;
        height: 600px;
        border: 1px solid var(--border-color);
        background: white;
        border-radius: var(--border-radius);
    }
    .node rect { stroke: #333; fill: #fff; }
    .edgePath path { stroke: #333; fill: none; stroke-width: 2px; }
</style>
{% endblock %}

{% block content %}
<div class="main-content">
    <h1>Matriz de Harris: {{ yacimiento.nombre }}</h1>
    <div id="harris-graph" class="harris-container"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre-d3/0.6.4/dagre-d3.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Lógica básica para cargar el JSON y renderizar con dagre-d3
        fetch("{{ url_for('ue.harris_json', yacimiento_id=yacimiento.id) }}")
            .then(response => response.json())
            .then(data => {
                // Implementación simplificada de renderizado
                console.log("Datos de Harris cargados", data);
            });
    });
</script>
{% endblock %}
