[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones por defecto
addopts =
    --tb=short
    --strict-markers
    -q

# Cobertura (ejecutar con: pytest --cov=app --cov-report=term-missing)
markers =
    unit: Tests unitarios (sin acceso a BD real)
    integration: Tests de integración (con BD en memoria)
    slow: Tests lentos

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
